<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Daily Timer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    /* ── Cabecera ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }
    .header h1 { font-size: 14px; font-weight: 600; color: #4da6ff; letter-spacing: 0.5px; }
    .btn-icon {
      background: none; border: none; color: #888;
      cursor: pointer; font-size: 16px; padding: 4px 6px;
      border-radius: 4px; transition: color .2s, background .2s;
    }
    .btn-icon:hover { color: #fff; background: rgba(255,255,255,.1); }

    /* ── Persona actual ── */
    .current-person { padding: 20px 16px 10px; text-align: center; }
    .person-label {
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 1px; color: #666; margin-bottom: 4px;
    }
    .person-name  { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 2px; }
    .person-tasks { font-size: 12px; color: #4da6ff; }
    .counter      { font-size: 11px; color: #555; margin-top: 2px; }

    /* ── Temporizador ── */
    .timer-wrap {
      display: flex; flex-direction: column;
      align-items: center; padding: 8px 16px 14px;
    }
    .timer-display {
      font-size: 68px; font-weight: 700; letter-spacing: -2px;
      color: #fff; font-family: 'Courier New', monospace;
      font-variant-numeric: tabular-nums; line-height: 1;
      transition: color .3s;
    }
    .timer-wrap.warning  .timer-display { color: #ff5630; animation: pulse .5s ease-in-out infinite alternate; }
    .timer-wrap.finished .timer-display { color: #36b37e; animation: none; }

    @keyframes pulse { from { opacity: 1; } to { opacity: .45; } }

    /* ── Controles ── */
    .controls { display: flex; gap: 10px; padding: 0 16px 12px; }
    .btn {
      flex: 1; padding: 10px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 20px;
      transition: background .2s, transform .1s;
    }
    .btn:active { transform: scale(.94); }
    .btn-play  { background: #0052cc; color: #fff; flex: 2; }
    .btn-play:hover  { background: #0065ff; }
    .btn-secondary { background: #252540; color: #aaa; }
    .btn-secondary:hover { background: #2f2f50; color: #fff; }
    .btn-next:hover { background: #1e7a52; color: #fff; }

    /* ── Mensaje de estado ── */
    .status-msg { text-align: center; font-size: 12px; color: #888; padding: 2px 16px 8px; min-height: 22px; }
    .status-msg.error   { color: #ff5630; }
    .status-msg.success { color: #36b37e; }

    /* ── Separador ── */
    .divider { height: 1px; background: #0f3460; margin: 0 16px; }

    /* ── Lista de participantes ── */
    .list-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px 6px;
    }
    .list-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #555; }
    .load-buttons { display: flex; gap: 6px; }
    .btn-fetch {
      font-size: 11px; padding: 4px 10px;
      border: 1px solid #0052cc; background: none;
      color: #4da6ff; border-radius: 4px; cursor: pointer; transition: background .2s;
    }
    .btn-fetch:hover { background: rgba(0,82,204,.2); }
    .btn-fetch:disabled { opacity: .5; cursor: default; }
    .btn-fetch-dom {
      font-size: 11px; padding: 4px 10px;
      border: 1px solid #1e7a52; background: none;
      color: #36b37e; border-radius: 4px; cursor: pointer; transition: background .2s;
    }
    .btn-fetch-dom:hover { background: rgba(54,179,126,.15); }
    .btn-fetch-dom:disabled { opacity: .5; cursor: default; }

    .participants { max-height: 200px; overflow-y: auto; padding: 0 16px 16px; }
    .participants::-webkit-scrollbar       { width: 4px; }
    .participants::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .participant-item {
      display: flex; align-items: center;
      padding: 7px 10px; border-radius: 6px; margin-bottom: 4px;
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: background .2s;
    }
    .participant-item:hover { background: rgba(255,255,255,.05); }
    .participant-item.active {
      background: rgba(0,82,204,.22);
      border-left-color: #0052cc;
    }
    .participant-item.done   { opacity: .35; }
    .participant-item.absent { opacity: .35; }
    .participant-item.absent .p-name { text-decoration: line-through; color: #555; }
    .participant-item.absent:hover   { opacity: .55; }

    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: #0f3460; display: flex; align-items: center;
      justify-content: center; font-size: 12px; font-weight: 700;
      color: #4da6ff; margin-right: 10px; flex-shrink: 0;
    }
    .participant-item.active .avatar { background: #0052cc; color: #fff; }

    .p-name  { flex: 1; font-size: 13px; color: #ddd; }
    .p-tasks {
      font-size: 11px; color: #666;
      background: #252540; padding: 2px 7px; border-radius: 10px;
    }
    .btn-absent {
      background: none; border: none; cursor: pointer;
      font-size: 13px; color: #444; padding: 2px 5px;
      border-radius: 4px; margin-left: 4px; flex-shrink: 0;
      transition: color .15s, background .15s;
    }
    .btn-absent:hover { color: #ff5630; background: rgba(255,86,48,.12); }
    .participant-item.absent .btn-absent { color: #36b37e; }
    .participant-item.absent .btn-absent:hover { color: #57d9a3; background: rgba(54,179,126,.12); }

    .empty-state { text-align: center; padding: 18px; color: #444; font-size: 13px; }
  </style>
</head>
<body>

  <!-- Cabecera -->
  <div class="header">
    <h1>⏱ Daily Timer</h1>
    <button class="btn-icon" id="btn-options" title="Configuración de Notion">⚙️</button>
  </div>

  <!-- Persona actual -->
  <div class="current-person">
    <div class="person-label">Turno actual</div>
    <div class="person-name"  id="current-name">—</div>
    <div class="person-tasks" id="current-tasks"></div>
    <div class="counter"      id="counter"></div>
  </div>

  <!-- Temporizador -->
  <div class="timer-wrap" id="timer-wrap">
    <div class="timer-display" id="timer-display">2:00</div>
  </div>

  <!-- Controles -->
  <div class="controls">
    <button class="btn btn-secondary" id="btn-reset" title="Reiniciar">↺</button>
    <button class="btn btn-play"      id="btn-play-pause">▶</button>
    <button class="btn btn-secondary btn-next" id="btn-next" title="Siguiente persona">⏭</button>
  </div>

  <!-- Estado -->
  <div class="status-msg" id="status-msg"></div>

  <div class="divider"></div>

  <!-- Lista -->
  <div class="list-header">
    <span class="list-title">Participantes</span>
    <div class="load-buttons">
      <button class="btn-fetch-dom" id="btn-fetch-dom" title="Lee los nombres directamente de la pestaña de Notion abierta">📄 Desde página</button>
      <button class="btn-fetch"     id="btn-fetch"     title="Usa la API de Notion (requiere token)">↻ API</button>
    </div>
  </div>

  <div class="participants" id="participants-list">
    <div class="empty-state">Configura tus credenciales (⚙️) y carga los participantes.</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
